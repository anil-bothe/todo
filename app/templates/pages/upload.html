{% extends "base.html" %}
{% load static %}
{% block title %} Forms {% endblock title %}
{% block css %}
{% endblock css %}
{% block content %}
<div class="my-5 text-center">
    <h4>File upload form</h4>
    {% if msg %}
    <p>{{msg}}</p>
    {% endif %}
</div>
<div class="my-5">
    <form action="" method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        <div class="mb-3">
            <label for="name" class="form-label">Your name</label>
            <input name="name" type="text" class="form-control" id="name">
        </div>
        <div class="mb-3">
            <label for="image" class="form-label">Select file or Image</label>
            <input name="image" type="file" class="form-control" id="image" accept="image/png, image/gif, image/jpeg" />
        </div>
        <button type="submit" class="btn btn-primary">Submit</button>
    </form>
</div>
{% endblock content %}
{% block js %}

{% endblock js %}
